<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Restaurant AI</title>

    <!-- GSI can dung inline/eval: can script-src ro rang. accounts.google.com can cho CSS gsi/style + fetch token. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://accounts.google.com; img-src 'self' data: https:; font-src 'self' data: https://cdnjs.cloudflare.com; connect-src 'self' http://157.66.219.65 http://localhost:8080 http://127.0.0.1:8080 https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com; frame-src https://accounts.google.com;">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="stylesheet" href="dangnhap.css" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- Navbar: index/customer-header.html (inject bởi index/customer-header.js) -->
    <header class="navbar navbar-expand-lg navbar-light bg-white px-4 py-2 sticky-top shadow-sm"></header>

    <section class="login-section d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5 col-xl-4">
                    <div class="login-card p-4 shadow-lg text-center bg-white rounded-4">
                        <h2 class="fw-bold mb-4 text-dark">Đăng Nhập</h2>

                        <form id="loginForm">
                            <div class="input-group mb-3 custom-input">
                                <span class="input-group-text border-0 bg-light">
                                    <i class="fa-solid fa-user text-primary"></i>
                                </span>
                                <input type="text" id="username" class="form-control border-0 bg-light" placeholder="Email hoặc Số điện thoại" autocomplete="username" required />
                            </div>

                            <div class="input-group mb-2 custom-input">
                                <span class="input-group-text border-0 bg-light">
                                    <i class="fa-solid fa-lock text-warning"></i>
                                </span>
                                <input type="password" id="password" class="form-control border-0 bg-light" placeholder="Mật khẩu" autocomplete="current-password" required />
                            </div>

                            <div class="text-end mb-4">
                                <a href="#" id="forgotPasswordLink" class="text-orange text-decoration-none small fw-bold" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" id="loginBtn" class="btn btn-orange w-100 text-white fw-bold py-2 mb-4 shadow-sm">
                                ĐĂNG NHẬP
                            </button>

                            <div class="d-flex align-items-center mb-4">
                                <hr class="flex-grow-1" />
                                <span class="mx-2 text-muted small">Hoặc tiếp tục với</span>
                                <hr class="flex-grow-1" />
                            </div>

                            <!-- Google Sign-In: lỗi 400 origin_mismatch = vào GCP → OAuth client (Web)
                                 → Authorized JavaScript origins → thêm ĐÚNG origin (scheme+host+cổng), ví dụ:
                                 http://127.0.0.1:5501 và http://localhost:5501 (hai origin khác nhau). -->
                            <div class="d-flex justify-content-center mb-4">
                                <div id="g_id_onload"
                                     data-client_id="69603544612-rb1t7phvocsqs89p8ap2sj0dtb82tbig.apps.googleusercontent.com"
                                     data-context="signin"
                                     data-ux_mode="popup"
                                     data-callback="handleGoogleLogin"
                                     data-auto_prompt="false">
                                </div>
                                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left" data-width="320"></div>
                            </div>

                            <p class="mb-0 text-muted">
                                Chưa có tài khoản? <a href="dangky.html" class="text-orange fw-bold text-decoration-none">Đăng ký ngay</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="forgotPasswordModalLabel">Khôi phục mật khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body">
                    <div class="small text-muted mb-3">
                        Bước 1: nhập email để nhận OTP. Bước 2: nhập OTP và mật khẩu mới.
                    </div>
                    <form id="forgotPasswordForm">
                        <div class="mb-3">
                            <label for="forgotEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="forgotEmail" placeholder="example@email.com" required />
                        </div>
                        <button type="button" class="btn btn-outline-warning w-100 mb-3" id="sendOtpBtn">Gửi mã OTP</button>

                        <div class="mb-3">
                            <label for="resetOtpCode" class="form-label">Mã OTP (6 số)</label>
                            <input type="text" class="form-control" id="resetOtpCode" maxlength="6" pattern="\d{6}" placeholder="Nhập mã OTP" required />
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" id="newPassword" minlength="6" placeholder="Tối thiểu 6 ký tự" required />
                        </div>
                        <div class="mb-3">
                            <label for="confirmNewPassword" class="form-label">Nhập lại mật khẩu mới</label>
                            <input type="password" class="form-control" id="confirmNewPassword" minlength="6" placeholder="Nhập lại mật khẩu mới" required />
                        </div>
                        <button type="submit" class="btn btn-orange text-white w-100 fw-bold" id="resetPasswordBtn">Đặt lại mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="config.js"></script>
    <script src="index/qr-session.js"></script>
    <script src="index/customer-header.js"></script>
    <script src="dangnhap.js"></script>
</body>
</html>
