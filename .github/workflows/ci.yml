# CI: kiểm tra backend build (Gradle) và cú pháp JS ở codefe.

name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-backend1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
          cache: gradle
          cache-dependency-path: restaurant-backend1/**/*.gradle*

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Gradle build (compile + tests)
        run: ./gradlew build --no-daemon

  frontend-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Syntax-check JS in codefe
        run: find codefe -name "*.js" -print0 | xargs -0 -r -n1 node --check
